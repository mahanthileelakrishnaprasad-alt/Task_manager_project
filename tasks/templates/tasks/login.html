<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — PersonalHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--surface:#111318;--card:#181c24;--border:#252b3a;--teal:#22d3b8;--teal-dim:#0e6b5d;--text:#e2e8f0;--muted:#64748b;--red:#f87171;--red-dim:#7f1d1d;--green:#4ade80;--green-dim:#14532d}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:380px}
.logo{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px}
.logo span{color:var(--teal)}
.subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px}
.label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 14px;border-radius:8px;outline:none;transition:border-color .2s;margin-bottom:14px}
.input:focus{border-color:var(--teal)}
.btn{width:100%;background:var(--teal);color:#0a0c10;border:none;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;padding:11px;border-radius:8px;cursor:pointer;transition:background .2s;margin-top:4px}
.btn:hover{background:#1ab89f}
.link{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.link a{color:var(--teal);text-decoration:none;font-weight:600}
.err{background:rgba(248,113,113,.12);color:var(--red);border:1px solid var(--red-dim);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Personal<span>Hub</span></div>
  <div class="subtitle">Sign in to your workspace</div>
  {% if messages %}{% for m in messages %}<div class="err">{{ m }}</div>{% endfor %}{% endif %}
  <form method="POST">
    {% csrf_token %}
    <label class="label">Username</label>
    <input class="input" type="text" name="username" required autocomplete="username" autofocus/>
    <label class="label">Password</label>
    <input class="input" type="password" name="password" required autocomplete="current-password"/>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="link">Don't have an account? <a href="/register/">Register</a></div>
</div>
</body>
</html>
